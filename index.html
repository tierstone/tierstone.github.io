<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tierstone Foundation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', serif;
      background: #0f0f0f;
      color: #f0ece4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .logo-mark {
      width: 70px;
      height: 70px;
      margin: 0 auto 1.5rem;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: normal;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #f0ece4;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: #b8974a;
      margin: 1.2rem auto;
    }

    p {
      font-size: 1rem;
      color: #9a9080;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.75rem;
      color: #444;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <div class="container">
    <svg class="logo-mark" viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="35,5 65,55 5,55" stroke="#b8974a" stroke-width="2" fill="none"/>
      <polygon points="35,20 52,50 18,50" stroke="#b8974a" stroke-width="1.5" fill="rgba(184,151,74,0.08)"/>
      <line x1="35" y1="5" x2="35" y2="55" stroke="#b8974a" stroke-width="1" opacity="0.4"/>
    </svg>

    <h1>Tierstone Foundation</h1>
    <div class="divider"></div>
    <p>Building what endures</p>
  </div>

  <footer>tierstone.site &mdash; coming soon</footer>

</body>
</html>
